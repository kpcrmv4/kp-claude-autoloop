<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>autoloop · dashboard</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1f2630; --border: #2d333b;
    --text: #e6edf3; --dim: #8b949e; --accent: #4d9fff;
    --green: #3fb950; --amber: #d29922; --red: #f85149; --blue: #58a6ff;
    font-size: 15px;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1.25rem 4rem;
    font-family: "IBM Plex Sans Thai", "Segoe UI", system-ui, sans-serif;
  }
  .wrap { max-width: 880px; margin: 0 auto; }
  header { display: flex; align-items: baseline; gap: .75rem; margin-bottom: 1.5rem; }
  header h1 { font-size: 1.35rem; font-weight: 600; letter-spacing: -.01em; }
  header .sub { color: var(--dim); font-size: .85rem; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem 1.15rem; margin-bottom: .9rem;
  }
  .row { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; }
  .chip {
    font-size: .72rem; font-weight: 600; padding: .18rem .55rem; border-radius: 99px;
    letter-spacing: .02em; text-transform: uppercase;
  }
  .chip.running { background: rgba(63,185,80,.15); color: var(--green); }
  .chip.sleeping { background: rgba(210,153,34,.15); color: var(--amber); }
  .chip.error, .chip.dead { background: rgba(248,81,73,.15); color: var(--red); }
  .chip.done { background: rgba(88,166,255,.15); color: var(--blue); }
  .chip.stopped, .chip.unknown { background: rgba(139,148,158,.15); color: var(--dim); }
  .path { color: var(--dim); font-size: .78rem; word-break: break-all; margin-top: .2rem; }
  .meta { color: var(--dim); font-size: .8rem; margin-top: .45rem; display: flex; gap: 1.1rem; flex-wrap: wrap; }
  .meta b { color: var(--text); font-weight: 600; }
  .bar { height: 7px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-top: .6rem; }
  .bar > i { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 99px; transition: width .6s ease; }
  .next { font-size: .82rem; color: var(--dim); margin-top: .4rem; }
  .next b { color: var(--text); font-weight: 500; }
  .countdown { font-variant-numeric: tabular-nums; color: var(--amber); font-weight: 600; }
  .actions { margin-top: .7rem; display: flex; gap: .5rem; }
  button {
    font: inherit; font-size: .8rem; padding: .32rem .8rem; border-radius: 7px; cursor: pointer;
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
  }
  button:hover { border-color: var(--dim); }
  button.danger { color: var(--red); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  details { margin-top: .6rem; }
  summary { font-size: .78rem; color: var(--dim); cursor: pointer; user-select: none; }
  pre.log {
    margin-top: .5rem; padding: .7rem .8rem; background: #0a0d12; border: 1px solid var(--border);
    border-radius: 8px; font-size: .72rem; line-height: 1.55; max-height: 260px; overflow: auto;
    white-space: pre-wrap; word-break: break-all; color: #9da7b3;
  }
  textarea.rules {
    width: 100%; margin-top: .5rem; min-height: 150px; padding: .7rem .8rem; resize: vertical;
    background: #0a0d12; border: 1px solid var(--border); border-radius: 8px;
    font-family: Consolas, monospace; font-size: .74rem; line-height: 1.5; color: var(--text);
  }
  textarea.rules:focus { outline: none; border-color: var(--accent); }
  .rulesout { font-size: .75rem; align-self: center; }
  .empty { color: var(--dim); text-align: center; padding: 2.2rem 0; font-size: .9rem; }
  h2 { font-size: .95rem; font-weight: 600; margin: 1.8rem 0 .8rem; color: var(--dim); letter-spacing: .03em; }
  form.start { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; }
  form.start .full { grid-column: 1 / -1; }
  label { display: block; font-size: .75rem; color: var(--dim); margin-bottom: .25rem; }
  input, select {
    width: 100%; font: inherit; font-size: .82rem; padding: .45rem .6rem; border-radius: 7px;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .startout { grid-column: 1 / -1; font-size: .75rem; white-space: pre-wrap; color: var(--dim); }
  .startout.err { color: var(--red); }
  @media (max-width: 640px) { form.start { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>autoloop</h1>
    <span class="sub">localhost dashboard · refresh อัตโนมัติทุก 2 วิ</span>
  </header>

  <div id="runs"><div class="empty">กำลังโหลด…</div></div>

  <h2>เริ่ม RUN ใหม่</h2>
  <div class="card">
    <form class="start" id="startForm">
      <div class="full"><label>โฟลเดอร์โปรเจกต์ (--cwd)</label><input name="cwd" placeholder="F:\my-proj" required></div>
      <div class="full"><label>State file (checklist + stop marker)</label><input name="stateFile" placeholder="F:\my-proj\docs\STATE.md" required></div>
      <div class="full"><label>Session (แนะนำระบุ — ไม่เลือก = --continue แชทล่าสุดใน cwd)</label>
        <select name="session"><option value="">— แชทล่าสุดใน cwd —</option></select></div>
      <div><label>Prompt file (hot-reload ทุกรอบ)</label><input name="promptFile" placeholder="F:\my-proj\docs\round-prompt.txt"></div>
      <div><label>Model rules (สลับ model ต่อรอบตามความยากงาน — แนะนำ)</label><input name="modelRules" placeholder="F:\my-proj\docs\model-rules.json"></div>
      <div><label>Model (fallback เมื่อไม่มี rules — อย่าปล่อย default เครื่อง)</label>
        <select name="model">
          <option value="claude-sonnet-5">claude-sonnet-5 (แนะนำ)</option>
          <option value="claude-opus-4-8">claude-opus-4-8</option>
          <option value="claude-haiku-4-5">claude-haiku-4-5</option>
          <option value="">— default เครื่อง (เสี่ยงเผาโควตา) —</option>
        </select></div>
      <div><label>Effort</label>
        <select name="effort">
          <option value="high">high</option><option value="medium">medium</option>
          <option value="low">low</option><option value="max">max</option>
          <option value="">— default —</option>
        </select></div>
      <div><label>Max cycles</label><input name="maxCycles" type="number" value="20" min="1"></div>
      <div><label>Permission mode</label>
        <select name="permissionMode"><option value="acceptEdits">acceptEdits</option><option value="default">default</option><option value="plan">plan</option></select></div>
      <div class="full"><button class="primary" type="submit">▶ เริ่มทำงาน (detached)</button></div>
      <div class="startout" id="startOut"></div>
    </form>
  </div>
</div>

<script>
const $ = (s, el = document) => el.querySelector(s);
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const CHIP_TH = { running: 'ทำงานอยู่', sleeping: 'รอโควตา', done: 'เสร็จแล้ว', error: 'ERROR', stopped: 'หยุดแล้ว', unknown: 'ไม่ทราบ', dead: 'ตายกลางคัน' };

function countdown(iso) {
  const ms = new Date(iso).getTime() - Date.now();
  if (!(ms > 0)) return 'ใกล้ตื่นแล้ว';
  const s = Math.floor(ms / 1000), h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return (h ? h + ' ชม. ' : '') + m + ' นาที ' + String(s % 60).padStart(2, '0') + ' วิ';
}

function runCard(r) {
  // sidecar says running but the pid is gone = the loop died mid-run
  const st = (r.status === 'running' || r.status === 'sleeping') && !r.alive ? 'dead' : r.status;
  const pct = r.plan ? r.plan.pct : null;
  const open = openLogs.has(r.stateFile);
  return `<div class="card" data-state="${esc(r.stateFile)}">
    <div class="row">
      <span class="chip ${st}">${CHIP_TH[st] || st}</span>
      <b>${esc((r.cwd || '').split(/[\\\/]/).pop() || r.stateFile)}</b>
      ${r.pid && r.alive ? `<span class="path">pid ${r.pid}</span>` : ''}
    </div>
    <div class="path">${esc(r.stateFile)}</div>
    ${pct != null ? `<div class="bar"><i style="width:${pct}%"></i></div>` : ''}
    <div class="meta">
      ${pct != null ? `<span>แผน <b>${r.plan.done}/${r.plan.total}</b> ข้อ (<b>${pct}%</b>)</span>` : ''}
      ${r.cycles != null ? `<span>รอบสำเร็จ <b>${r.cycles}</b></span>` : ''}
      ${r.waits ? `<span>โดนลิมิต <b>${r.waits}</b> ครั้ง</span>` : ''}
      ${r.sessionId ? `<span>session <b>${esc(r.sessionId.slice(0, 8))}</b></span>` : ''}
      ${r.model ? `<span>model รอบนี้ <b>${esc(r.model)}${r.effort ? '/' + esc(r.effort) : ''}</b>${r.modelRule ? ` <span title="${esc(r.modelRule)}">(ตาม rule)</span>` : ''}</span>` : ''}
      ${st === 'sleeping' && r.resumeAt ? `<span>ตื่นในอีก <span class="countdown">${countdown(r.resumeAt)}</span></span>` : ''}
      ${st === 'done' && r.doneReason ? `<span>จบเพราะ <b>${esc(r.doneReason)}</b></span>` : ''}
    </div>
    ${r.plan && r.plan.nextItem ? `<div class="next">ถัดไป: <b>${esc(r.plan.nextItem)}</b></div>` : ''}
    ${st === 'error' && r.lastError ? `<div class="next" style="color:var(--red)">${esc(r.lastError)}</div>` : ''}
    <div class="actions">
      ${r.alive ? `<button class="danger" onclick="stopRun('${escJs(r.stateFile)}')">⏹ หยุด (จบสวยหลังรอบนี้)</button>` : `<button onclick="forgetRun('${escJs(r.stateFile)}')">ลบออกจากลิสต์</button>`}
    </div>
    <details ${open ? 'open' : ''} ontoggle="toggleLog(this, '${escJs(r.stateFile)}')">
      <summary>log ล่าสุด</summary>
      <pre class="log" data-log>…</pre>
    </details>
    ${r.modelRulesFile ? `<details ${openRules.has(r.stateFile) ? 'open' : ''} ontoggle="toggleRules(this, '${escJs(r.stateFile)}', '${escJs(r.modelRulesFile)}')">
      <summary>⚙ model rules — แก้สดได้ (engine hot-reload รอบถัดไป)</summary>
      <textarea class="rules" data-rules spellcheck="false"></textarea>
      <div class="actions"><button onclick="saveRules(this, '${escJs(r.modelRulesFile)}')">💾 บันทึก</button><span class="rulesout" data-rulesout></span></div>
    </details>` : ''}
  </div>`;
}

const escJs = (s) => String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
const openLogs = new Set();
const openRules = new Set();
const rulesDraft = new Map(); // stateFile → unsaved textarea content (survives the 2s repaint)

async function refresh() {
  try {
    const { runs } = await (await fetch('/api/runs')).json();
    const box = $('#runs');
    // stash unsaved rules edits before the repaint wipes the textareas
    for (const ta of box.querySelectorAll('textarea[data-rules]')) {
      const state = ta.closest('.card').dataset.state;
      if (openRules.has(state)) rulesDraft.set(state, ta.value);
    }
    box.innerHTML = runs.length ? runs.map(runCard).join('') : '<div class="empty">ยังไม่มี run — เริ่มอันแรกจากฟอร์มด้านล่าง หรือรัน autoloop start จาก CLI แล้วจะโผล่ที่นี่เอง</div>';
    for (const el of box.querySelectorAll('details[open]')) {
      if (el.querySelector('[data-log]')) loadLog(el);
      const ta = el.querySelector('textarea[data-rules]');
      if (ta) {
        const state = el.closest('.card').dataset.state;
        if (rulesDraft.has(state)) ta.value = rulesDraft.get(state);
      }
    }
  } catch { /* server gone — keep last view */ }
}

async function loadLog(detailsEl) {
  const state = detailsEl.closest('.card').dataset.state;
  const { lines } = await (await fetch('/api/log?lines=80&state=' + encodeURIComponent(state))).json();
  const pre = detailsEl.querySelector('[data-log]');
  if (pre) { pre.textContent = lines.join('\n') || '(ยังไม่มี log)'; pre.scrollTop = pre.scrollHeight; }
}

function toggleLog(el, state) { el.open ? openLogs.add(state) : openLogs.delete(state); if (el.open) loadLog(el); }

async function toggleRules(el, state, rulesPath) {
  if (!el.open) { openRules.delete(state); rulesDraft.delete(state); return; }
  openRules.add(state);
  const ta = el.querySelector('textarea[data-rules]');
  if (rulesDraft.has(state)) { ta.value = rulesDraft.get(state); return; }
  const res = await fetch('/api/model-rules?path=' + encodeURIComponent(rulesPath));
  const data = await res.json();
  ta.value = res.ok ? data.content : `(อ่านไม่ได้: ${data.error})`;
  rulesDraft.set(state, ta.value);
}

async function saveRules(btn, rulesPath) {
  const card = btn.closest('.card');
  const ta = card.querySelector('textarea[data-rules]');
  const out = card.querySelector('[data-rulesout]');
  const { ok, data } = await post('/api/model-rules', { path: rulesPath, content: ta.value });
  out.textContent = ok ? (data.warn ? '⚠ ' + data.warn : '✓ บันทึกแล้ว — มีผลรอบถัดไป') : '✗ ' + (data.error || 'บันทึกไม่สำเร็จ');
  out.style.color = ok ? (data.warn ? 'var(--amber)' : 'var(--green)') : 'var(--red)';
  if (ok) rulesDraft.set(card.dataset.state, ta.value);
}

async function post(path, body) {
  const res = await fetch(path, { method: 'POST', headers: { 'content-type': 'application/json', 'x-autoloop': '1' }, body: JSON.stringify(body) });
  return { ok: res.ok, data: await res.json() };
}

async function stopRun(stateFile) { await post('/api/stop', { stateFile }); refresh(); }
async function forgetRun(stateFile) { await post('/api/forget', { stateFile }); refresh(); }

$('#startForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const f = Object.fromEntries(new FormData(e.target).entries());
  const out = $('#startOut');
  out.className = 'startout'; out.textContent = 'กำลังเริ่ม…';
  const { ok, data } = await post('/api/start', f);
  out.className = 'startout' + (ok ? '' : ' err');
  out.textContent = ok ? (data.output || 'เริ่มแล้ว') : (data.error || data.output || 'เริ่มไม่สำเร็จ');
  if (ok) setTimeout(refresh, 800);
});

async function loadSessions() {
  try {
    const { sessions } = await (await fetch('/api/sessions')).json();
    const sel = $('select[name=session]');
    for (const s of sessions) {
      const opt = document.createElement('option');
      opt.value = s.sessionId;
      const proj = (s.cwd || '').split(/[\\\/]/).pop() || '?';
      opt.textContent = `${proj} · ${s.sessionId.slice(0, 8)} · ${s.preview.slice(0, 40)}`;
      sel.appendChild(opt);
    }
  } catch { /* ignore */ }
}

refresh();
loadSessions();
setInterval(refresh, 2000);
</script>
</body>
</html>
